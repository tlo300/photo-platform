# .github/workflows/security.yml
# Runs pip-audit (Python) and npm audit (Node) on every pull request to main.
# Fails the build on HIGH or CRITICAL CVEs.
name: Security scan

on:
  pull_request:
    branches:
      - main

jobs:
  pip-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit backend dependencies
        # pip-audit exits non-zero on any vulnerability.
        # CVE-2024-23342 (ecdsa) is ignored: ecdsa is unmaintained with no fix
        # available; it is a transitive dep of python-jose used only for EC key
        # generation which this project does not use (HS256/RS256 only).
        run: |
          pip-audit \
            -r backend/requirements.txt \
            -r backend/requirements-dev.txt \
            --ignore-vuln CVE-2024-23342

  npm-audit:
    name: Node dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit frontend dependencies
        working-directory: frontend
        # --audit-level high fails on HIGH and CRITICAL; omit-dev keeps dev deps out of scope
        run: npm audit --audit-level=high --omit=dev
